# External REST API base URL (overridden in tests via @DynamicPropertySource)
app.external-api.base-url=http://localhost:8081

# Spring AI / OpenAI configuration
# In production, set these via environment variables:
#   SPRING_AI_OPENAI_BASE_URL=https://api.openai.com
#   SPRING_AI_OPENAI_API_KEY=sk-...
# In tests, overridden via @DynamicPropertySource to point at httptape.
spring.ai.openai.base-url=https://api.openai.com
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.options.model=gpt-4o-mini

# Virtual threads (Java 21+, Spring Boot 3.2+).
# Tomcat uses a virtual-thread executor — each in-flight HTTP request
# occupies a virtual thread (JVM-managed, essentially free) instead of
# an OS thread from the bounded pool. This makes the .block() call in
# RecommendationService.recommend() idiomatic: parking a virtual thread
# is the same primitive as a Reactor subscription, no thread starvation
# concerns even under heavy concurrency.
spring.threads.virtual.enabled=true
