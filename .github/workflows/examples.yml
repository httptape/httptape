# .github/workflows/examples.yml
#
# Per-example smoke build for examples/<name>/.
#
# Lives in its own workflow (separate from `test.yml`) so that an
# example breakage does not turn the library "Tests" badge red. Each
# example is a matrix entry; `fail-fast: false` keeps one broken
# example from short-circuiting the others.
#
# Path filter restricts triggers to changes under examples/** or this
# workflow file itself. Library-only changes do not run this workflow.
#
# Adding a new example:
#   1. Add an entry to the `matrix.example` list. Required keys:
#        name              - human-readable check label
#        path              - directory under examples/
#        build-command     - shell command run inside `path`
#      Optional keys (pick one toolchain):
#        node-version      - Node.js major to install (triggers setup-node)
#        lockfile          - relative path to the npm lockfile
#                            (used by setup-node cache)
#        java-version      - JDK major to install (triggers setup-java)
#   2. Add matching dependabot.yml blocks for the example's ecosystems
#      (see .github/dependabot.yml for the pattern).
#   3. Append a row to examples/README.md.

name: Examples

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - ".github/workflows/examples.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - ".github/workflows/examples.yml"

permissions:
  contents: read

concurrency:
  group: examples-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.example.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - name: ts-frontend-first
            path: examples/ts-frontend-first
            node-version: "20"
            lockfile: examples/ts-frontend-first/package-lock.json
            build-command: npm run build

          - name: java-spring-boot
            path: examples/java-spring-boot
            java-version: "25"
            build-command: ./mvnw -B test

          - name: kotlin-ktor-koog
            path: examples/kotlin-ktor-koog
            java-version: "25"
            gradle-cache: true
            build-command: ./gradlew test --no-daemon
    defaults:
      run:
        working-directory: ${{ matrix.example.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Node.js toolchain (ts-frontend-first and future JS examples) ---
      - name: Set up Node.js
        if: matrix.example.node-version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.example.node-version }}
          cache: npm
          cache-dependency-path: ${{ matrix.example.lockfile }}

      - name: Install npm dependencies
        if: matrix.example.node-version
        run: npm ci

      # --- Java toolchain (java-spring-boot and future JVM examples) ---
      # Install JDK 21 (for the httptape-jvm SDK build) and JDK 25 (for
      # the demo projects). setup-java's last invocation sets JAVA_HOME,
      # so JDK 25 goes last.
      - name: Set up JDK 21 (SDK toolchain)
        if: matrix.example.java-version
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up JDK ${{ matrix.example.java-version }}
        if: matrix.example.java-version
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.example.java-version }}
          cache: ${{ matrix.example.gradle-cache && 'gradle' || 'maven' }}

      # --- httptape-jvm SDK (for JVM examples consuming the SDK) ---
      # Checkout as sibling so composite build (../../../httptape-jvm from
      # examples/kotlin-ktor-koog) resolves, and publishToMavenLocal works
      # for the Maven-based Java demo.
      - name: Checkout httptape-jvm SDK
        if: matrix.example.java-version
        uses: actions/checkout@v6
        with:
          repository: VibeWarden/httptape-jvm
          path: ../httptape-jvm
          ref: main

      - name: Publish SDK to Maven local
        if: matrix.example.java-version
        working-directory: ${{ github.workspace }}/../httptape-jvm
        run: ./gradlew publishToMavenLocal --no-daemon

      # --- Build / test (all examples) ---
      - name: Build
        run: ${{ matrix.example.build-command }}
